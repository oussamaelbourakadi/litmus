# Optional Render blueprint for the Litmus backend (card-free alternative).
#
# Render web services do NOT require a credit card, but Render's free Postgres
# expires after 30 days — so this blueprint provisions ONLY the web service and
# expects an external DATABASE_URL (e.g. a free Neon database). See docs/DEPLOY.md.
#
# Deploy: Render Dashboard → New → Blueprint → connect this repo, then set
# DATABASE_URL (Neon) and CORS_ORIGINS (Vercel URL).

services:
  - type: web
    name: litmus-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false # paste your Neon connection string
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://litmus.vercel.app
