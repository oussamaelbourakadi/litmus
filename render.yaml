# Render blueprint for the Litmus backend + managed PostgreSQL.
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# After the frontend is on Vercel, set CORS_ORIGINS to the Vercel URL.

databases:
  - name: litmus-db
    databaseName: litmus
    user: litmus
    plan: free

services:
  - type: web
    name: litmus-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: litmus-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://litmus.vercel.app
