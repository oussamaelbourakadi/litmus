services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litmus
      POSTGRES_PASSWORD: litmus
      POSTGRES_DB: litmus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litmus"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://litmus:litmus@postgres:5432/litmus
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      # Optional: point at a host-run Ollama (no key). Harmless if Ollama is absent.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
